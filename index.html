<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raghavendra Opticals</title>

<style>
body { margin:0; font-family:Arial; background:#f3f3f3; }

/* NAVBAR */
.navbar {
  background:#131921; color:white; padding:10px;
  display:flex; justify-content:space-between; align-items:center;
}
.logo { font-size:20px; font-weight:bold; }

/* SEARCH */
.search-box {
  padding:5px; width:40%; border-radius:4px; border:none;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px; padding:20px;
}
.card {
  background:white; padding:15px; border-radius:8px;
  text-align:center;
}
.card img { width:100%; height:150px; object-fit:cover; }

.price { color:#B12704; font-weight:bold; }

/* BUTTONS */
button {
  margin:5px; padding:6px 10px;
  border:none; border-radius:4px;
  cursor:pointer;
}
.add { background:#ffd814; }
.buy { background:#ffa41c; }
.pay { background:#28a745; color:white; }

/* CART */
.cart {
  position:fixed; right:10px; top:10px;
  background:white; padding:10px; border-radius:10px;
}

/* MAP */
.map {
  text-align:center;
  margin:30px;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:15px;
  background:#f2f9ff;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Raghavendra Opticals</div>
  <input type="text" class="search-box" placeholder="Search..." onkeyup="search(this.value)">
</div>

<!-- CART -->
<div class="cart">
  🛒 Items: <span id="count">0</span><br>
  Total: ₹<span id="total">0</span><br>
  <button onclick="orderWhatsApp()">Order</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList">

<div class="card" data-name="frame">
<img src="https://i.imgur.com/2DhmtJ4.jpg">
<h4>Stylish Frame</h4>
<p class="price">₹1200</p>
<button class="add" onclick="add('Stylish Frame',1200)">Add</button>
<button class="buy" onclick="buy('Stylish Frame',1200)">Buy</button>
</div>

<div class="card" data-name="premium">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<h4>Premium Frame</h4>
<p class="price">₹2500</p>
<button class="add" onclick="add('Premium Frame',2500)">Add</button>
<button class="buy" onclick="buy('Premium Frame',2500)">Buy</button>
</div>

<div class="card" data-name="sunglasses">
<img src="https://i.imgur.com/7R8R6R6.jpg">
<h4>Sunglasses</h4>
<p class="price">₹1500</p>
<button class="add" onclick="add('Sunglasses',1500)">Add</button>
<button class="buy" onclick="buy('Sunglasses',1500)">Buy</button>
</div>

</div>

<!-- MAP (UPDATED) -->
<div class="map">
<iframe 
src="https://www.google.com/maps?q=Raghavendra%20Opticals&output=embed"
width="90%" height="250" style="border:0;">
</iframe>
</div>

<!-- PAYMENT -->
<div style="text-align:center;">
<h3>Pay via UPI</h3>
<a href="upi://pay?pa=tejaswiniursba8@ptyes&pn=RaghavendraOpticals">
<button class="pay">Pay Now</button>
</a>
</div>

<!-- CONTACT -->
<div class="footer">
<p>📞 9480500674</p>
<p>© 2026 Raghavendra Opticals</p>
</div>

<script>
let cart = [];
let total = 0;

function add(name, price){
  cart.push(name + " ₹" + price);
  total += price;
  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;
}

function buy(name, price){
  let msg = "I want to buy: " + name + " ₹" + price;
  window.open("https://wa.me/919480500674?text=" + encodeURIComponent(msg));
}

function orderWhatsApp(){
  let msg = "Order:\n" + cart.join("\n") + "\nTotal ₹" + total;
  window.open("https://wa.me/919480500674?text=" + encodeURIComponent(msg));
}

/* SEARCH */
function search(value){
  value = value.toLowerCase();
  let items = document.querySelectorAll(".card");
  items.forEach(item=>{
    let name = item.getAttribute("data-name");
    item.style.display = name.includes(value) ? "block" : "none";
  });
}
</script>

</body>
</html>
