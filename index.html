<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raghavendra Opticals</title>

<style>
body { margin:0; font-family:Arial; background:#f3f3f3; }

.header {
  text-align:center;
  background:#131921;
  color:white;
  padding:20px;
}
.header h1 { margin:0; font-size:40px; }

.search-box {
  margin-top:10px;
  padding:6px;
  width:50%;
  border-radius:4px;
  border:none;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:8px;
  text-align:center;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.price { color:#B12704; font-weight:bold; }

.buy {
  background:#ffa41c;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

.cart {
  position:fixed;
  right:10px;
  top:10px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* POPUP */
#orderPopup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  text-align:center;
  max-height:80vh;
  overflow:auto;
}

.map { text-align:center; margin:30px; }

.footer {
  text-align:center;
  padding:15px;
  background:#f2f9ff;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>RAGHAVENDRA OPTICALS</h1>
  <input type="text" class="search-box" placeholder="Search..." onkeyup="search(this.value)">
</div>

<!-- CART -->
<div class="cart">
  🛒 Items: <span id="count">0</span><br>
  Total: ₹<span id="total">0</span>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card" data-name="frame">
<img src="https://images.unsplash.com/photo-1587574293340-e0011c4e8ecf">
<h4>Stylish Frame</h4>
<p class="price">₹1200</p>
<button class="buy" onclick="orderNow('Stylish Frame',1200)">Order</button>
</div>

<div class="card" data-name="premium">
<img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f">
<h4>Premium Frame</h4>
<p class="price">₹2500</p>
<button class="buy" onclick="orderNow('Premium Frame',2500)">Order</button>
</div>

<div class="card" data-name="sunglasses">
<img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083">
<h4>Sunglasses</h4>
<p class="price">₹1500</p>
<button class="buy" onclick="orderNow('Sunglasses',1500)">Order</button>
</div>

</div>

<!-- POPUP -->
<div id="orderPopup">
<h3>🛒 Your Order</h3>

<div id="orderItems"></div>

<p><b>Total: ₹<span id="popupTotal"></span></b></p>

<button onclick="goWhatsApp()">💬 WhatsApp Order</button><br><br>

<a id="upiLink">
<button style="background:#28a745;color:white;">💳 Pay via UPI</button>
</a><br><br>

<button onclick="closePopup()">❌ Close</button>
</div>

<!-- MAP -->
<div class="map">
<iframe src="https://www.google.com/maps?q=Raghavendra%20Opticals%20Bangalore&output=embed"
width="90%" height="250" style="border:0;"></iframe>

<div style="margin-top:10px;">
<a href="https://maps.app.goo.gl/FVcMtQgCJwjd3SCB9" target="_blank">
<button style="background:#007bff;color:white;padding:10px 20px;border-radius:6px;">
📍 Get Directions
</button>
</a>
</div>
</div>

<!-- FOOTER -->
<div class="footer">
<p>📞 9480500674</p>
<p>© 2026 Raghavendra Opticals</p>
</div>

<script>
let cart = {};
let total = 0;

let productImages = {
  "Stylish Frame": "https://images.unsplash.com/photo-1587574293340-e0011c4e8ecf",
  "Premium Frame": "https://images.unsplash.com/photo-1572635196237-14b3f281503f",
  "Sunglasses": "https://images.unsplash.com/photo-1511499767150-a48a237f0083"
};

/* ORDER BUTTON = ADD + OPEN POPUP */
function orderNow(name, price){
  if(cart[name]){
    cart[name].qty++;
  } else {
    cart[name] = {price: price, qty: 1};
  }

  total += price;
  updateCart();
  openPopup();
}

/* UPDATE CART TOP */
function updateCart(){
  let count = 0;

  for(let item in cart){
    count += cart[item].qty;
  }

  document.getElementById("count").innerText = count;
  document.getElementById("total").innerText = total;
}

/* POPUP FULL CART */
function openPopup(){
  let html = "";

  for(let item in cart){
    html += `
      <div style="margin-bottom:10px;">
        <img src="${productImages[item]}" width="80"><br>
        <b>${item}</b><br>
        Qty: ${cart[item].qty}<br>
        Price: ₹${cart[item].price}
      </div>
    `;
  }

  document.getElementById("orderItems").innerHTML = html;
  document.getElementById("popupTotal").innerText = total;

  document.getElementById("upiLink").href =
    "upi://pay?pa=tejaswiniursba8@ptyes&pn=RaghavendraOpticals&am=" + total;

  document.getElementById("orderPopup").style.display = "block";
}

function closePopup(){
  document.getElementById("orderPopup").style.display = "none";
}

/* WHATSAPP */
function goWhatsApp(){
  let msg = "Order:\n";

  for(let item in cart){
    msg += item + " (" + cart[item].qty + ")\n";
  }

  msg += "Total ₹" + total;

  window.open("https://wa.me/919480500674?text=" + encodeURIComponent(msg));
}

/* SEARCH */
function search(value){
  value = value.toLowerCase();
  let items = document.querySelectorAll(".card");
  items.forEach(item=>{
    let name = item.getAttribute("data-name");
    item.style.display = name.includes(value) ? "block" : "none";
  });
}
</script>

</body>
</html>
