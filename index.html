<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raghavendra Opticals</title>

<style>
body { margin:0; font-family:Arial; background:#f3f3f3; }

.header {
  text-align:center;
  background:#131921;
  color:white;
  padding:20px;
}
.header h1 { margin:0; font-size:40px; }

.search-box {
  margin-top:10px;
  padding:6px;
  width:50%;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:8px;
  text-align:center;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.price { color:#B12704; }

.buy {
  background:#ffa41c;
  border:none;
  padding:8px 12px;
  cursor:pointer;
}

.cart {
  position:fixed;
  right:10px;
  top:10px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* POPUP */
#orderPopup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  text-align:center;
  max-height:80vh;
  overflow:auto;
}

.map { text-align:center; margin:30px; }

.footer {
  text-align:center;
  padding:15px;
  background:#f2f9ff;
}

button { cursor:pointer; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>RAGHAVENDRA OPTICALS</h1>
  <input type="text" class="search-box" placeholder="Search..." onkeyup="search(this.value)">
</div>

<!-- CART -->
<div class="cart">
  🛒 Items: <span id="count">0</span><br>
  Total: ₹<span id="total">0</span>
</div>

<!-- MAIN PRODUCTS -->
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1587574293340-e0011c4e8ecf">
<h4>Stylish Frame</h4>
<p class="price">From ₹1200</p>
<button class="buy" onclick="showCategory('frame')">View</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f">
<h4>Premium Frame</h4>
<p class="price">From ₹2500</p>
<button class="buy" onclick="showCategory('premium')">View</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083">
<h4>Sunglasses</h4>
<p class="price">From ₹1500</p>
<button class="buy" onclick="showCategory('sunglasses')">View</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511499767850-a48a237f0093">
<h4>Contact lense</h4>
<p class="price">From ₹250</p>
<button class="buy" onclick="showCategory('contact lense')">View</button>
</div>
</div>

<!-- POPUP -->
<div id="orderPopup">
<h3 id="popupTitle">Products</h3>

<div id="categoryItems"></div>

<hr>
<p><b>Total: ₹<span id="popup Total">0</span></b></p>

<button onclick="goWhatsApp()">💬 WhatsApp Order</button><br><br>

<a id="upiLink">
<button style="background:#28a745;color:white;">💳 Pay via UPI</button>
</a><br><br>

<button onclick="closePopup()">❌ Close</button>
</div>

<!-- MAP -->
<div class="map">
<iframe src="https://www.google.com/maps?q=Raghavendra%20Opticals%20Bangalore&output=embed"
width="90%" height="250"></iframe>

<br><br>

<a href="https://maps.app.goo.gl/FVcMtQgCJwjd3SCB9" target="_blank">
<button style="background:#007bff;color:white;padding:10px 20px;">
📍 Get Directions
</button>
</a>
</div>

<!-- FOOTER -->
<div class="footer">
<p>📞 9480500674</p>
<p>© 2026 Raghavendra Opticals</p>
</div>

<script>
let cart = {};
let total = 0;

/* PRODUCTS */
let categories = {
  frame: [
    {name:"Classic Frame", price:1200, img:"https://images.unsplash.com/photo-1591076482161-42ce6da69f67"},
    {name:"Modern Frame", price:1300, img:"https://images.unsplash.com/photo-1616401784845-180882ba9ba8"},
    {name:"Round Frame", price:1400, img:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb"}
  ],

  premium: [
    {name:"Premium Black", price:2500, img:"https://images.unsplash.com/photo-1572635196237-14b3f281503f"},
    {name:"Luxury Gold", price:2800, img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},
    {name:"Designer Frame", price:3000, img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"}
  ],

  sunglasses: [
    {name:"Cool Shades", price:1500, img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},
    {name:"Dark Glass", price:1700, img:"https://images.unsplash.com/photo-1509695507497-903c140c43b0"},
    {name:"Stylish Sunglass", price:1800, img:"https://images.unsplash.com/photo-1526178613552-2b45c6c302f0"}
  ]
};

/* SHOW CATEGORY */
function showCategory(type){
  let items = categories[type];
  let html = "";

  items.forEach(p => {

    // FRAME = quantity buttons
    if(type === "frame"){
      html += `
        <div style="display:inline-block;width:170px;margin:10px;background:#f9f9f9;padding:10px;border-radius:8px;">
          <img src="${p.img}" style="width:100%;height:100px;"><br>
          <b>${p.name}</b><br>
          ₹${p.price}<br><br>

          <button onclick="changeQty('${p.name}', ${p.price}, -1)">➖</button>
          <span id="qty_${p.name.replace(/ /g,'')}">0</span>
          <button onclick="changeQty('${p.name}', ${p.price}, 1)">➕</button>
        </div>
      `;
    }

    // OTHER PRODUCTS = ORDER
    else{
      html += `
        <div style="display:inline-block;width:170px;margin:10px;">
          <img src="${p.img}" style="width:100%;height:100px;"><br>
          <b>${p.name}</b><br>
          ₹${p.price}<br>
          <button onclick="orderNow('${p.name}', ${p.price})">Order</button>
        </div>
      `;
    }

  });

  document.getElementById("categoryItems").innerHTML = html;
  document.getElementById("popupTitle").innerText = type.toUpperCase() + " COLLECTION";
  document.getElementById("orderPopup").style.display = "block";
}

/* QUANTITY CONTROL */
function changeQty(name, price, change){
  if(!cart[name]){
    cart[name] = {price: price, qty: 0};
  }

  cart[name].qty += change;

  if(cart[name].qty <= 0){
    total -= price;
    delete cart[name];
  } else {
    total += change * price;
  }

  let id = "qty_" + name.replace(/ /g,'');
  let qty = cart[name] ? cart[name].qty : 0;

  document.getElementById(id).innerText = qty;

  updateTotal();
}

/* ORDER BUTTON */
function orderNow(name, price){
  if(cart[name]){
    cart[name].qty++;
  } else {
    cart[name] = {price: price, qty: 1};
  }

  total += price;
  updateTotal();
}

/* UPDATE TOTAL */
function updateTotal(){
  let count = 0;

  for(let item in cart){
    count += cart[item].qty;
  }

  document.getElementById("count").innerText = count;
  document.getElementById("total").innerText = total;
  document.getElementById("popupTotal").innerText = total;

  document.getElementById("upiLink").href =
    "upi://pay?pa=tejaswiniursba8@ptyes&pn=RaghavendraOpticals&am=" + total;
}

/* CLOSE */
function closePopup(){
  document.getElementById("orderPopup").style.display = "none";
}

/* WHATSAPP */
function goWhatsApp(){
  let msg = "Order:\n";

  for(let item in cart){
    msg += item + " (" + cart[item].qty + ")\n";
  }

  msg += "Total ₹" + total;

  window.open("https://wa.me/919480500674?text=" + encodeURIComponent(msg));
}

/* SEARCH */
function search(value){
  value = value.toLowerCase();
  let items = document.querySelectorAll(".card");

  items.forEach(item=>{
    let name = item.innerText.toLowerCase();
    item.style.display = name.includes(value) ? "block" : "none";
  });
}
</script>

</body>
</html>
